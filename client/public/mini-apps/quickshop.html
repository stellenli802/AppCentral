<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrimeCart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Amazon Ember', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #eaeded; color: #0f1111; -webkit-font-smoothing: antialiased; }

    .header { background: #131921; color: white; padding: 10px 12px 8px; position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .logo-wrap { display: flex; flex-direction: column; align-items: flex-start; }
    .logo-text { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; line-height: 1; }
    .logo-smile { width: 60px; height: 10px; margin-top: -2px; margin-left: 2px; }
    .logo-smile svg { width: 60px; height: 10px; }
    .sdk-badge { display: inline-block; background: rgba(255,153,0,0.25); padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; color: #ff9900; border: 1px solid rgba(255,153,0,0.4); margin-left: auto; }
    .deliver-to { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #ccc; margin-left: 8px; cursor: pointer; }
    .deliver-to svg { width: 14px; height: 14px; fill: #ccc; flex-shrink: 0; }
    .deliver-to span { color: #fff; font-weight: 700; font-size: 12px; }

    .search-wrap { display: flex; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .search-cat { background: #e6e6e6; border: none; padding: 0 8px; font-size: 11px; color: #555; cursor: pointer; border-right: 1px solid #ccc; display: none; }
    .search-input { flex: 1; padding: 10px 14px; border: none; font-size: 15px; outline: none; background: #fff; color: #0f1111; }
    .search-input::placeholder { color: #999; font-size: 14px; }
    .search-btn { background: #febd69; border: none; padding: 0 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .search-btn:active { background: #f3a847; }
    .search-btn svg { width: 22px; height: 22px; fill: #131921; }

    .nav-bar { background: #232f3e; padding: 0; display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .nav-bar::-webkit-scrollbar { display: none; }
    .nav-bar a { color: #fff; font-size: 13px; white-space: nowrap; text-decoration: none; font-weight: 400; cursor: pointer; padding: 10px 14px; display: block; transition: background 0.15s; }
    .nav-bar a:first-child { padding-left: 12px; }
    .nav-bar a:active { background: #37475a; }
    .nav-bar a.active-nav { border-bottom: 2px solid #ff9900; font-weight: 600; }

    .bridge-bar { background: #37475a; padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .bridge-btn { background: #ff9900; color: #0f1111; border: none; padding: 7px 16px; border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.3px; transition: background 0.15s; }
    .bridge-btn:active { background: #e88a00; }
    .bridge-btn.done { background: #067d62; color: white; pointer-events: none; }
    .bridge-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .bridge-status { font-size: 11px; color: #8d9096; flex: 1; text-align: right; }

    .content { padding: 0 0 20px; max-width: 600px; margin: 0 auto; }

    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 12px 8px; gap: 8px; }
    .section-title { font-size: 18px; font-weight: 800; color: #0f1111; }
    .section-link { font-size: 13px; color: #007185; font-weight: 500; cursor: pointer; white-space: nowrap; }

    .deals-section { background: #fff; margin-bottom: 8px; padding-bottom: 12px; }
    .deals-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 12px 4px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .deals-scroll::-webkit-scrollbar { display: none; }
    .deal-card { min-width: 155px; max-width: 155px; background: white; border-radius: 8px; overflow: hidden; scroll-snap-align: start; cursor: pointer; flex-shrink: 0; border: 1px solid #e3e6e6; transition: box-shadow 0.15s; }
    .deal-card:active { box-shadow: 0 0 0 2px #ff9900; }
    .deal-img { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 44px; position: relative; }
    .deal-badge { position: absolute; top: 8px; left: 0; background: #cc0c39; color: white; font-size: 11px; font-weight: 800; padding: 3px 10px 3px 6px; border-radius: 0 3px 3px 0; }
    .deal-info { padding: 10px; }
    .deal-price { font-size: 17px; font-weight: 800; color: #0f1111; }
    .deal-price .was { font-size: 12px; color: #565959; text-decoration: line-through; font-weight: 400; margin-left: 6px; }
    .deal-name { font-size: 12px; color: #565959; margin-top: 3px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .deal-timer { font-size: 10px; color: #cc0c39; margin-top: 5px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
    .deal-timer-icon { width: 12px; height: 12px; }

    .cat-section { background: #fff; margin-bottom: 8px; padding-bottom: 14px; }
    .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 12px; }
    .cat-item { background: #fff; border-radius: 10px; padding: 14px 8px; text-align: center; cursor: pointer; border: 1px solid #e3e6e6; transition: box-shadow 0.15s; }
    .cat-item:active { box-shadow: 0 0 0 2px #ff9900; }
    .cat-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 8px; }
    .cat-label { font-size: 12px; font-weight: 600; color: #0f1111; }

    .products-section { background: #fff; margin-bottom: 8px; }
    .product-card { padding: 12px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
    .product-card:last-child { border-bottom: none; }
    .product-card:active { background: #f7fafa; }
    .product-img { width: 110px; height: 110px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 40px; flex-shrink: 0; border: 1px solid #e3e6e6; }
    .product-details { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .product-name { font-size: 14px; color: #0f1111; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-rating { display: flex; align-items: center; gap: 4px; margin-top: 4px; }
    .stars { color: #de7921; font-size: 13px; letter-spacing: -1px; }
    .rating-count { font-size: 12px; color: #007185; }
    .product-price { font-size: 21px; font-weight: 800; margin-top: 4px; color: #0f1111; }
    .product-price .currency { font-size: 13px; vertical-align: super; font-weight: 400; }
    .product-price .cents { font-size: 13px; vertical-align: super; }
    .prime-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 3px; }
    .prime-check { width: 16px; height: 16px; }
    .prime-text { font-size: 13px; font-weight: 700; color: #0574c7; font-style: italic; letter-spacing: -0.3px; }
    .delivery-info { font-size: 12px; color: #565959; margin-top: 2px; }
    .delivery-free { color: #067d62; font-weight: 600; }
    .add-to-cart-btn { background: #ffd814; border: 1px solid #fcd200; color: #0f1111; font-size: 12px; font-weight: 600; padding: 6px 16px; border-radius: 20px; cursor: pointer; margin-top: 6px; align-self: flex-start; transition: background 0.15s; }
    .add-to-cart-btn:active { background: #f7ca00; }

    .reorder-section { background: #fff; margin-bottom: 8px; padding-bottom: 12px; display: none; }
    .reorder-section.visible { display: block; }
    .reorder-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 12px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .reorder-scroll::-webkit-scrollbar { display: none; }
    .reorder-card { min-width: 130px; max-width: 130px; background: #fff; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #e3e6e6; flex-shrink: 0; }
    .reorder-card:active { box-shadow: 0 0 0 2px #ff9900; }
    .reorder-img { width: 70px; height: 70px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 8px; }
    .reorder-name { font-size: 11px; color: #0f1111; line-height: 1.3; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .reorder-btn { background: #ffd814; border: 1px solid #fcd200; color: #0f1111; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; cursor: pointer; width: 100%; }
    .reorder-btn:active { background: #f7ca00; }

    .order-section { background: #fff; margin-bottom: 8px; padding-bottom: 12px; display: none; }
    .order-section.visible { display: block; }
    .order-card { margin: 0 12px 10px; border: 1px solid #e3e6e6; border-radius: 10px; overflow: hidden; }
    .order-card-top { background: #f0f2f2; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; border-bottom: 1px solid #e3e6e6; }
    .order-id { font-size: 11px; color: #565959; }
    .order-status { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
    .order-status.shipped { background: #fef3c7; color: #92400e; }
    .order-status.delivered { background: #d1fae5; color: #065f46; }
    .order-status.processing { background: #dbeafe; color: #1e40af; }
    .order-status.out-for-delivery { background: #fef3c7; color: #92400e; }
    .order-body { padding: 14px; }
    .order-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .order-item-img { width: 48px; height: 48px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: #f3f4f6; flex-shrink: 0; }
    .order-item-info { flex: 1; }
    .order-item-name { font-size: 13px; font-weight: 500; color: #0f1111; }
    .order-item-sub { font-size: 11px; color: #565959; margin-top: 2px; }
    .order-progress { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
    .order-progress-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .order-progress-bar.shipped { background: linear-gradient(90deg, #ff9900, #febd69); }
    .order-progress-bar.delivered { background: #067d62; }
    .order-progress-bar.processing { background: #3b82f6; }
    .order-progress-bar.out-for-delivery { background: linear-gradient(90deg, #ff9900, #febd69); }
    .order-steps { display: flex; justify-content: space-between; margin-top: 6px; gap: 4px; }
    .order-step { font-size: 9px; color: #8d9096; text-align: center; flex: 1; }
    .order-step.active { color: #0f1111; font-weight: 700; }
    .order-eta { font-size: 12px; color: #067d62; font-weight: 700; margin-top: 10px; display: flex; align-items: center; gap: 4px; }
    .order-eta svg { width: 14px; height: 14px; fill: #067d62; }

    .search-results { display: none; }
    .search-results.visible { display: block; }
    .search-back { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #007185; cursor: pointer; padding: 12px; font-weight: 600; background: #fff; border-bottom: 1px solid #e3e6e6; }
    .search-back svg { width: 16px; height: 16px; fill: #007185; }
    .no-results { text-align: center; padding: 40px 20px; color: #565959; }
    .no-results-title { font-size: 16px; font-weight: 700; color: #0f1111; margin-bottom: 4px; }
    .main-content { display: block; }
    .main-content.hidden { display: none; }

    .promo-banner { background: linear-gradient(135deg, #232f3e 0%, #37475a 100%); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .promo-text { color: #fff; font-size: 13px; line-height: 1.4; }
    .promo-text strong { color: #ff9900; }
    .promo-arrow { color: #ff9900; font-size: 20px; margin-left: auto; }

    @media (min-width: 400px) {
      .cat-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="logo-wrap">
        <div style="display:flex;align-items:center;gap:6px;">
          <svg viewBox="0 0 32 32" width="26" height="26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 6h2.5l1.2 3H26a1 1 0 0 1 .96 1.28l-3 10A1 1 0 0 1 23 21H11a1 1 0 0 1-.96-.72L7.04 8H6V6z" fill="#FFFFFF"/>
            <circle cx="12" cy="25" r="2" fill="#FFFFFF"/>
            <circle cx="22" cy="25" r="2" fill="#FFFFFF"/>
          </svg>
          <div class="logo-text">PrimeCart</div>
        </div>
        <div class="logo-smile">
          <svg viewBox="0 0 60 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 5 Q15 12 35 5" stroke="#FF9900" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M30 5 L36 1 L34 6" fill="#FF9900"/>
          </svg>
        </div>
      </div>
      <span class="sdk-badge">SDK v1</span>
    </div>
    <div class="search-wrap">
      <input type="text" class="search-input" placeholder="Search PrimeCart" id="searchInput" data-testid="input-search" />
      <button class="search-btn" onclick="doSearch()" data-testid="button-search">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
    </div>
  </div>

  <div class="nav-bar" id="navBar">
    <a onclick="filterCat('all')" class="active-nav" data-testid="link-nav-all">All</a>
    <a onclick="filterCat('deals')" data-testid="link-nav-deals">Today's Deals</a>
    <a onclick="handleBuyAgain()" data-testid="link-nav-buyagain">Buy Again</a>
    <a data-testid="link-nav-prime">Prime</a>
    <a data-testid="link-nav-account">Account</a>
    <a data-testid="link-nav-lists">Lists</a>
  </div>

  <div class="bridge-bar">
    <button class="bridge-btn" onclick="handleAuth()" id="authBtn" data-testid="button-auth">Sign In</button>
    <button class="bridge-btn" onclick="handleNotify()" id="notifBtn" disabled data-testid="button-notify">Test Notify</button>
    <span class="bridge-status" id="bridgeStatus" data-testid="text-bridge-status">SDK: initializing</span>
  </div>

  <div class="content">
    <div class="search-results" id="searchResults">
      <div class="search-back" onclick="clearSearch()" data-testid="button-search-back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to shop
      </div>
      <div id="searchResultsList"></div>
    </div>

    <div class="main-content" id="mainContent">

      <div class="promo-banner" data-testid="banner-promo">
        <div class="promo-text">
          <strong>Free shipping</strong> on your first order. Sign in to get started.
        </div>
        <div class="promo-arrow">&rsaquo;</div>
      </div>

      <div class="reorder-section" id="reorderSection">
        <div class="section-header">
          <div class="section-title">Frequently Reordered</div>
          <div class="section-link">See All</div>
        </div>
        <div class="reorder-scroll" id="reorderScroll"></div>
      </div>

      <div class="order-section" id="orderSection">
        <div class="section-header">
          <div class="section-title">Your Orders</div>
          <div class="section-link">View All</div>
        </div>
        <div id="ordersList"></div>
      </div>

      <div class="deals-section" id="dealsSection">
        <div class="section-header">
          <div class="section-title">Today's Deals</div>
          <div class="section-link">See all deals</div>
        </div>
        <div class="deals-scroll" id="dealsScroll"></div>
      </div>

      <div class="cat-section">
        <div class="section-header">
          <div class="section-title">Shop by Category</div>
        </div>
        <div class="cat-grid" id="catGrid"></div>
      </div>

      <div class="products-section">
        <div class="section-header">
          <div class="section-title" id="productsTitle">Recommended for You</div>
          <div class="section-link">See more</div>
        </div>
        <div id="productsList"></div>
      </div>
    </div>
  </div>

      var full = Math.floor(rating);
      var half = rating % 1 >= 0.3;
      var s = "";
      for (var i = 0; i < full; i++) s += "&#9733;";
      if (half) s += "&#9734;";
      for (var j = full + (half ? 1 : 0); j < 5; j++) s += "&#9734;";
      return s;
    }

    function renderCategories() {
      document.getElementById("catGrid").innerHTML = CATEGORIES.map(function(c) {
        return '<div class="cat-item" onclick="filterCat(\'' + c.id + '\')" data-testid="card-category-' + c.id + '">' +
          '<div class="cat-icon" style="background:' + c.bg + '">' + c.icon + '</div>' +
          '<div class="cat-label">' + c.label + '</div>' +
        '</div>';
      }).join("");
    }

    function renderDeals() {
      document.getElementById("dealsScroll").innerHTML = DEALS.map(function(d, i) {
        return '<div class="deal-card" data-testid="card-deal-' + i + '">' +
          '<div class="deal-img" style="background:' + d.bg + '">' +
            '<div class="deal-badge">Up to ' + d.pct + '% off</div>' +
            d.icon +
          '</div>' +
          '<div class="deal-info">' +
            '<div class="deal-price">$' + d.price.toFixed(2) + '<span class="was">$' + d.was.toFixed(2) + '</span></div>' +
            '<div class="deal-name">' + d.name + '</div>' +
            '<div class="deal-timer">' +
              '<svg class="deal-timer-icon" viewBox="0 0 24 24" fill="#cc0c39"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>' +
              'Ends in ' + d.timer +
            '</div>' +
          '</div>' +
        '</div>';
      }).join("");
    }

    function renderProducts(cat) {
      var items = cat === "all" ? PRODUCTS : PRODUCTS.filter(function(p) { return p.cat === cat; });
      var title = cat === "all" ? "Recommended for You" : CATEGORIES.filter(function(c) { return c.id === cat; }).map(function(c) { return c.label; })[0] || "Products";
      document.getElementById("productsTitle").textContent = title;

      if (cat === "deals") {
        document.getElementById("dealsSection").style.display = "block";
        document.getElementById("productsList").innerHTML = "";
        return;
      }

      document.getElementById("dealsSection").style.display = cat === "all" ? "block" : "none";
      document.getElementById("productsList").innerHTML = items.map(function(p, i) {
        var isFree = p.delivery.indexOf("FREE") !== -1;
        return '<div class="product-card" data-testid="card-product-' + i + '">' +
          '<div class="product-img" style="background:' + p.bg + '">' + p.icon + '</div>' +
          '<div class="product-details">' +
            '<div class="product-name">' + p.name + '</div>' +
            '<div class="product-rating">' +
              '<span class="stars">' + renderStars(p.rating) + '</span>' +
              '<span class="rating-count">' + p.reviews.toLocaleString() + '</span>' +
            '</div>' +
            '<div class="product-price"><span class="currency">$</span>' + p.price + '<span class="cents">' + (p.cents < 10 ? '0' : '') + p.cents + '</span></div>' +
            (p.prime ?
              '<div class="prime-badge">' +
                '<svg class="prime-check" viewBox="0 0 24 24" fill="#0574c7"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' +
                '<span class="prime-text">prime</span>' +
              '</div>' : '') +
            '<div class="delivery-info">' + (isFree ? '<span class="delivery-free">FREE delivery</span> ' + p.delivery.replace('FREE delivery ', '') : p.delivery) + '</div>' +
            '<button class="add-to-cart-btn" data-testid="button-addtocart-' + i + '">Add to Cart</button>' +
          '</div>' +
        '</div>';
      }).join("");
    }

    function renderOrders() {
      document.getElementById("ordersList").innerHTML = ORDERS.map(function(o, i) {
        return '<div class="order-card" data-testid="card-order-' + i + '">' +
          '<div class="order-card-top">' +
            '<span class="order-id">Order ' + o.id + '</span>' +
            '<span class="order-status ' + o.status + '">' + o.statusLabel + '</span>' +
          '</div>' +
          '<div class="order-body">' +
            '<div class="order-item">' +
              '<div class="order-item-img">' + o.icon + '</div>' +
              '<div class="order-item-info">' +
                '<div class="order-item-name">' + o.item + '</div>' +
                '<div class="order-item-sub">Qty: 1</div>' +
              '</div>' +
            '</div>' +
            '<div class="order-progress"><div class="order-progress-bar ' + o.status + '" style="width:' + o.progress + '%"></div></div>' +
            '<div class="order-steps">' +
              o.steps.map(function(step, si) {
                return '<div class="order-step' + (si <= o.activeStep ? ' active' : '') + '">' + step + '</div>';
              }).join("") +
            '</div>' +
            '<div class="order-eta">' +
              '<svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6-4.5c0-.28.22-.5.5-.5s.5.22.5.5v2h-1v-2zM12 2c1.65 0 3 1.35 3 3v3H9V5c0-1.65 1.35-3 3-3z" fill="none"/><path d="M20 8h-3V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H4v14h16V8zM12 17l-4-4h3V9h2v4h3l-4 4z" fill="#067d62" opacity="0"/></svg>' +
              o.eta +
            '</div>' +
          '</div>' +
        '</div>';
      }).join("");
    }

    function renderReorders() {
      document.getElementById("reorderScroll").innerHTML = REORDER_ITEMS.map(function(r, i) {
        return '<div class="reorder-card" data-testid="card-reorder-' + i + '">' +
          '<div class="reorder-img" style="background:' + r.bg + '">' + r.icon + '</div>' +
          '<div class="reorder-name">' + r.name + '</div>' +
          '<div style="font-size:13px;font-weight:700;color:#0f1111;margin-bottom:6px;">' + r.price + '</div>' +
          '<button class="reorder-btn" data-testid="button-reorder-' + i + '">Buy Again</button>' +
        '</div>';
      }).join("");
    }

    function updateNavHighlight(cat) {
      document.querySelectorAll(".nav-bar a").forEach(function(a) { a.classList.remove("active-nav"); });
      var navLinks = document.querySelectorAll(".nav-bar a");
      if (cat === "all") navLinks[0].classList.add("active-nav");
      else if (cat === "deals") navLinks[1].classList.add("active-nav");
    }

    function filterCat(cat) {
      currentCat = cat;
      updateNavHighlight(cat);
      renderProducts(cat);
    }

    function handleBuyAgain() {
      if (!authed) {
        handleAuth();
      }
    }

    function doSearch() {
      var q = document.getElementById("searchInput").value.trim().toLowerCase();
      if (!q) return;
      var results = PRODUCTS.filter(function(p) {
        return p.name.toLowerCase().indexOf(q) !== -1 || p.cat.indexOf(q) !== -1;
      });
      var dealResults = DEALS.filter(function(d) {
        return d.name.toLowerCase().indexOf(q) !== -1 || d.cat.indexOf(q) !== -1;
      });

      document.getElementById("mainContent").classList.add("hidden");
      document.getElementById("searchResults").classList.add("visible");

      var html = '';
      if (results.length === 0 && dealResults.length === 0) {
        html = '<div class="no-results"><div class="no-results-title">No results found</div>Try searching for something else</div>';
      } else {
        html = '<div class="section-header"><div class="section-title">' + (results.length + dealResults.length) + ' results for "' + q + '"</div></div>';
        html += '<div class="products-section">';
        html += results.map(function(p, i) {
          var isFree = p.delivery.indexOf("FREE") !== -1;
          return '<div class="product-card" data-testid="card-search-result-' + i + '">' +
            '<div class="product-img" style="background:' + p.bg + '">' + p.icon + '</div>' +
            '<div class="product-details">' +
              '<div class="product-name">' + p.name + '</div>' +
              '<div class="product-rating">' +
                '<span class="stars">' + renderStars(p.rating) + '</span>' +
                '<span class="rating-count">' + p.reviews.toLocaleString() + '</span>' +
              '</div>' +
              '<div class="product-price"><span class="currency">$</span>' + p.price + '<span class="cents">' + (p.cents < 10 ? '0' : '') + p.cents + '</span></div>' +
              (p.prime ?
                '<div class="prime-badge">' +
                  '<svg class="prime-check" viewBox="0 0 24 24" fill="#0574c7"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' +
                  '<span class="prime-text">prime</span>' +
                '</div>' : '') +
              '<div class="delivery-info">' + (isFree ? '<span class="delivery-free">FREE delivery</span> ' + p.delivery.replace('FREE delivery ', '') : p.delivery) + '</div>' +
              '<button class="add-to-cart-btn">Add to Cart</button>' +
            '</div>' +
          '</div>';
        }).join("");
        html += '</div>';
      }
      document.getElementById("searchResultsList").innerHTML = html;
    }

    function clearSearch() {
      document.getElementById("searchInput").value = "";
      document.getElementById("mainContent").classList.remove("hidden");
      document.getElementById("searchResults").classList.remove("visible");
    }

    document.getElementById("searchInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") doSearch();
    });

    function handleAuth() {
      var btn = document.getElementById("authBtn");
      btn.disabled = true;
      document.getElementById("bridgeStatus").textContent = "SDK: requesting auth...";

      MiniApp.requestAuthCode()
        .then(function(code) {
          authed = true;
          btn.textContent = "Signed In";
          btn.className = "bridge-btn done";
          document.getElementById("notifBtn").disabled = false;
          document.getElementById("bridgeStatus").textContent = "SDK: authenticated";
          document.getElementById("orderSection").classList.add("visible");
          document.getElementById("reorderSection").classList.add("visible");
          document.querySelector(".promo-banner").style.display = "none";
          renderOrders();
          renderReorders();
        })
        .catch(function(err) {
          document.getElementById("bridgeStatus").textContent = "Auth: " + err.message;
          btn.disabled = false;
        });
    }

    function handleNotify() {
      document.getElementById("bridgeStatus").textContent = "SDK: sending notification...";
      MiniApp.sendNotification({
        title: "PrimeCart: Your order has shipped!",
        body: "Order PC-482910 (Wireless Earbuds Pro) is on its way. Estimated delivery: Tomorrow by 8 PM.",
        data: { orderId: "PC-482910", type: "shipment_update" }
      }).then(function() {
        document.getElementById("bridgeStatus").textContent = "SDK: notification sent";
      }).catch(function(err) {
        document.getElementById("bridgeStatus").textContent = "Notify: " + err.message;
      });
    }

    MiniApp.on("error", function(msg) {
      document.getElementById("bridgeStatus").textContent = "Error: " + (msg.message || msg.code);
    });

    renderCategories();
    renderDeals();
    renderProducts("all");

    MiniApp.init().then(function() {
      document.getElementById("bridgeStatus").textContent = "SDK: connected";
    });
  </script>
</body>
</html>
