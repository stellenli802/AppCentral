<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bullseye Mart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ffffff; color: #333333; -webkit-font-smoothing: antialiased; }

    .header { background: #CC0000; color: white; padding: 12px 16px 0; position: sticky; top: 0; z-index: 10; }
    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-bottom: 10px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .bullseye-logo { width: 36px; height: 36px; position: relative; flex-shrink: 0; }
    .bullseye-logo .ring-outer { width: 36px; height: 36px; border-radius: 50%; border: 5px solid white; position: absolute; top: 0; left: 0; }
    .bullseye-logo .ring-inner { width: 20px; height: 20px; border-radius: 50%; border: 5px solid white; position: absolute; top: 8px; left: 8px; }
    .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .sdk-badge { display: inline-block; background: rgba(255,255,255,0.25); padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 600; margin-left: 6px; letter-spacing: 0.5px; vertical-align: middle; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .cart-btn { background: none; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }
    .cart-btn:active { background: rgba(255,255,255,0.15); }
    .cart-count { position: absolute; top: 0; right: 0; background: #FACC15; color: #1a1a1a; font-size: 10px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #CC0000; }
    .cart-count.hidden { display: none; }

    .search-wrapper { padding: 0 0 12px; }
    .search-bar { display: flex; align-items: center; background: white; border-radius: 24px; padding: 0 14px; height: 40px; }
    .search-bar svg { color: #999; flex-shrink: 0; }
    .search-bar input { flex: 1; border: none; font-size: 14px; background: none; color: #333; outline: none; padding: 0 10px; height: 100%; }
    .search-bar input::placeholder { color: #999; }

    .quick-actions { display: flex; justify-content: space-around; gap: 8px; padding: 16px 16px 8px; background: #fff; }
    .quick-action { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; flex: 1; }
    .quick-action:active .qa-icon { transform: scale(0.95); }
    .qa-icon { width: 56px; height: 56px; border-radius: 50%; background: #F7F7F7; display: flex; align-items: center; justify-content: center; border: 2px solid #E0E0E0; transition: transform 0.1s; }
    .qa-icon svg { color: #CC0000; }
    .qa-label { font-size: 11px; font-weight: 600; color: #333; text-align: center; line-height: 1.2; }

    .bridge-bar { background: #FFF5F5; border-bottom: 1px solid #FED7D7; padding: 8px 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .bridge-btn { background: #CC0000; color: white; border: none; padding: 6px 14px; border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .bridge-btn:active { background: #A30000; }
    .bridge-btn.done { background: #16A34A; pointer-events: none; }
    .bridge-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .bridge-status { font-size: 11px; color: #64748b; flex: 1; text-align: right; }

    .location-bar { background: #F0FDF4; border-bottom: 1px solid #BBF7D0; padding: 8px 16px; font-size: 11px; color: #15803D; display: none; align-items: center; gap: 6px; }
    .location-bar.visible { display: flex; }
    .location-bar.error { background: #FEF2F2; border-color: #FECACA; color: #CC0000; }

    .section { padding: 16px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    .section-title { font-size: 18px; font-weight: 800; color: #333; }
    .section-link { font-size: 13px; color: #CC0000; font-weight: 600; cursor: pointer; white-space: nowrap; }

    .deals-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .deals-scroll::-webkit-scrollbar { display: none; }
    .deal-card { min-width: 160px; max-width: 160px; background: #fff; border-radius: 8px; border: 1px solid #F0F0F0; overflow: hidden; scroll-snap-align: start; cursor: pointer; flex-shrink: 0; transition: transform 0.1s; }
    .deal-card:active { transform: scale(0.97); }
    .deal-img { height: 130px; background: #F7F7F7; display: flex; align-items: center; justify-content: center; position: relative; }
    .deal-img .deal-icon { font-size: 48px; }
    .deal-badge { position: absolute; top: 8px; left: 8px; background: #CC0000; color: white; font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 4px; }
    .deal-info { padding: 10px; }
    .deal-name { font-size: 12px; color: #666; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .deal-price { font-size: 16px; font-weight: 800; color: #CC0000; }
    .deal-orig { font-size: 12px; color: #999; text-decoration: line-through; margin-left: 4px; font-weight: 400; }

    .categories-scroll { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
    .categories-scroll::-webkit-scrollbar { display: none; }
    .category-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; flex-shrink: 0; min-width: 68px; }
    .category-item:active .cat-circle { transform: scale(0.95); }
    .cat-circle { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; border: 2px solid #E8E8E8; }
    .cat-circle svg { color: #CC0000; }
    .cat-circle.active { border-color: #CC0000; background: #FFF0F0; }
    .cat-label { font-size: 11px; font-weight: 600; color: #333; text-align: center; }

    .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .product-card { background: white; border-radius: 8px; border: 1px solid #F0F0F0; overflow: hidden; cursor: pointer; transition: transform 0.1s; }
    .product-card:active { transform: scale(0.98); }
    .product-img { height: 140px; background: #F7F7F7; display: flex; align-items: center; justify-content: center; position: relative; }
    .product-img .prod-icon { font-size: 44px; }
    .sale-badge { position: absolute; top: 8px; left: 8px; background: #CC0000; color: white; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 4px; }
    .shipping-badge { position: absolute; bottom: 8px; left: 8px; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
    .shipping-badge.pickup { background: #E8F5E9; color: #2E7D32; }
    .shipping-badge.ships { background: #E3F2FD; color: #1565C0; }
    .product-info { padding: 12px; }
    .product-name { font-size: 13px; font-weight: 400; color: #333; margin-bottom: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-price-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
    .price-current { font-size: 18px; font-weight: 800; color: #333; }
    .price-sale { color: #CC0000; }
    .price-original { font-size: 12px; color: #999; text-decoration: line-through; }
    .product-rating { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; }
    .stars { color: #F59E0B; font-size: 12px; letter-spacing: -1px; }
    .rating-count { font-size: 11px; color: #999; }
    .add-cart-btn { width: 100%; background: #CC0000; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .add-cart-btn:active { background: #A30000; }
    .add-cart-btn.added { background: #16A34A; }

    .store-section { padding: 0 16px 24px; }
    .store-card { background: white; border-radius: 8px; border: 1px solid #F0F0F0; padding: 16px; }
    .store-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .store-card p { font-size: 13px; color: #666; }
    .store-info { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .store-badge { background: #E8F5E9; color: #2E7D32; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
    .store-hours { font-size: 12px; color: #666; }

    .cart-panel { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #E5E5E5; padding: 14px 16px; transform: translateY(100%); transition: transform 0.25s ease; z-index: 20; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); }
    .cart-panel.visible { transform: translateY(0); }
    .cart-summary { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .cart-total { font-size: 15px; font-weight: 700; }
    .cart-total span { color: #CC0000; }
    .checkout-btn { background: #CC0000; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .checkout-btn:active { background: #A30000; }

    .active-dept .cat-circle { border-color: #CC0000 !important; background: #FFF0F0 !important; }

    .recommended-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
    .recommended-scroll::-webkit-scrollbar { display: none; }
    .rec-card { min-width: 140px; max-width: 140px; background: #fff; border-radius: 8px; border: 1px solid #F0F0F0; overflow: hidden; flex-shrink: 0; cursor: pointer; transition: transform 0.1s; }
    .rec-card:active { transform: scale(0.97); }
    .rec-img { height: 120px; background: #F7F7F7; display: flex; align-items: center; justify-content: center; }
    .rec-img .rec-icon { font-size: 40px; }
    .rec-info { padding: 10px; }
    .rec-name { font-size: 12px; color: #666; margin-bottom: 4px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .rec-price { font-size: 15px; font-weight: 800; color: #333; }

    .divider { height: 8px; background: #F5F5F5; }
  </style>
</head>

  <div class="location-bar" id="locationBar"></div>

  <div class="divider"></div>

  <div class="section">

        { id: "g1", name: "Organic Mixed Berries - Frozen", price: 6.99, orig: 9.99, rating: 4.7, reviews: 3201, icon: "&#127827;", bg: "#F7F7F7", sale: true, pct: 30, ship: "pickup" },
        { id: "g2", name: "Whole Grain Pasta - 16oz", price: 2.49, orig: null, rating: 4.5, reviews: 1843, icon: "&#127837;", bg: "#F7F7F7", sale: false, pct: 0, ship: "ships" },
        { id: "g3", name: "Extra Virgin Olive Oil - 500ml", price: 8.99, orig: 12.99, rating: 4.8, reviews: 5620, icon: "&#129746;", bg: "#F7F7F7", sale: true, pct: 31, ship: "pickup" },
        { id: "g4", name: "Almond Milk - Unsweetened 64oz", price: 3.99, orig: null, rating: 4.4, reviews: 2105, icon: "&#129371;", bg: "#F7F7F7", sale: false, pct: 0, ship: "ships" }
      ],
      beauty: [
        { id: "b1", name: "Hydrating Face Moisturizer SPF 30", price: 16.99, orig: 24.99, rating: 4.6, reviews: 4102, icon: "&#129524;", bg: "#F7F7F7", sale: true, pct: 32, ship: "pickup" },
        { id: "b2", name: "Vitamin C Brightening Serum", price: 22.99, orig: null, rating: 4.7, reviews: 2890, icon: "&#10024;", bg: "#F7F7F7", sale: false, pct: 0, ship: "ships" }
      ],
      toys: [
        { id: "t1", name: "Building Block Set - 500 Pieces", price: 29.99, orig: 49.99, rating: 4.8, reviews: 7203, icon: "&#129521;", bg: "#F7F7F7", sale: true, pct: 40, ship: "pickup" },
        { id: "t2", name: "Remote Control Car - Off Road", price: 34.99, orig: null, rating: 4.3, reviews: 1650, icon: "&#127950;&#65039;", bg: "#F7F7F7", sale: false, pct: 0, ship: "ships" }
      ]
    };

    function getAllProducts() {
      var all = [];
      Object.keys(PRODUCTS).forEach(function(k) { all = all.concat(PRODUCTS[k]); });
      return all;
    }

    function renderStars(rating) {
      var full = Math.floor(rating);
      var half = rating % 1 >= 0.5;
      var s = "";
      for (var i = 0; i < full; i++) s += "\u2605";
      if (half) s += "\u2606";
      return s;
    }

    function getDeals() {
      var deals = [];
      Object.keys(PRODUCTS).forEach(function(k) {
        PRODUCTS[k].forEach(function(p) {
          if (p.sale) deals.push(p);
        });
      });
      return deals;
    }

    function renderDeals() {
      var deals = getDeals();
      document.getElementById("dealsScroll").innerHTML = deals.map(function(p) {
        return '<div class="deal-card" data-testid="card-deal-' + p.id + '">' +
          '<div class="deal-img">' +
            '<span class="deal-badge">' + p.pct + '% off</span>' +
            '<span class="deal-icon">' + p.icon + '</span>' +
          '</div>' +
          '<div class="deal-info">' +
            '<div class="deal-name">' + p.name + '</div>' +
            '<div><span class="deal-price">$' + p.price.toFixed(2) + '</span>' +
            (p.orig ? '<span class="deal-orig">$' + p.orig.toFixed(2) + '</span>' : '') +
            '</div>' +
          '</div>' +
        '</div>';
      }).join("");
    }

    function renderCategories() {
      document.getElementById("catScroll").innerHTML = DEPARTMENTS.map(function(d) {
        var activeClass = currentDept === d.id ? " active" : "";
        return '<div class="category-item' + (currentDept === d.id ? " active-dept" : "") + '" onclick="selectDept(\'' + d.id + '\')" data-testid="button-category-' + d.id + '">' +
          '<div class="cat-circle' + activeClass + '">' + d.svg + '</div>' +
          '<span class="cat-label">' + d.name + '</span>' +
        '</div>';
      }).join("");
    }

    function renderProducts(products) {
      document.getElementById("productGrid").innerHTML = products.map(function(p) {
        var inCart = cart.indexOf(p.id) !== -1;
        var shipLabel = p.ship === "pickup" ? "Pick up today" : "Ships free";
        var shipClass = p.ship === "pickup" ? "pickup" : "ships";
        return '<div class="product-card" data-testid="card-product-' + p.id + '">' +
          '<div class="product-img">' +
            (p.sale ? '<span class="sale-badge">' + p.pct + '% off</span>' : '') +
            '<span class="prod-icon">' + p.icon + '</span>' +
            '<span class="shipping-badge ' + shipClass + '">' + shipLabel + '</span>' +
          '</div>' +
          '<div class="product-info">' +
            '<div class="product-name">' + p.name + '</div>' +
            '<div class="product-price-row">' +
              '<span class="price-current' + (p.sale ? ' price-sale' : '') + '">$' + p.price.toFixed(2) + '</span>' +
              (p.orig ? '<span class="price-original">$' + p.orig.toFixed(2) + '</span>' : '') +
            '</div>' +
            '<div class="product-rating">' +
              '<span class="stars">' + renderStars(p.rating) + '</span>' +
              '<span class="rating-count">(' + p.reviews.toLocaleString() + ')</span>' +
            '</div>' +
            '<button class="add-cart-btn' + (inCart ? ' added' : '') + '" onclick="addToCart(\'' + p.id + '\', ' + p.price + ', event)" data-testid="button-add-cart-' + p.id + '">' +
              (inCart ? 'Added to cart' : 'Add to cart') +
            '</button>' +
          '</div>' +
        '</div>';
      }).join("");
    }

    function renderRecommended() {
      var all = getAllProducts();
      var shuffled = all.sort(function() { return 0.5 - Math.random(); });
      var recs = shuffled.slice(0, 8);
      document.getElementById("recScroll").innerHTML = recs.map(function(p) {
        return '<div class="rec-card" onclick="addToCart(\'' + p.id + '\', ' + p.price + ', event)" data-testid="card-rec-' + p.id + '">' +
          '<div class="rec-img"><span class="rec-icon">' + p.icon + '</span></div>' +
          '<div class="rec-info">' +
            '<div class="rec-name">' + p.name + '</div>' +
            '<div class="rec-price">$' + p.price.toFixed(2) + '</div>' +
          '</div>' +
        '</div>';
      }).join("");
    }

    function selectDept(id) {
      if (currentDept === id) {
        currentDept = null;
        document.getElementById("productsTitle").textContent = "Featured Products";
        document.getElementById("productsSeeAll").textContent = "See all";
        document.getElementById("productsSeeAll").onclick = null;
        renderProducts(getFeatured());
      } else {
        currentDept = id;
        var dept = DEPARTMENTS.find(function(d) { return d.id === id; });
        document.getElementById("productsTitle").textContent = dept.name;
        document.getElementById("productsSeeAll").textContent = "Clear";
        document.getElementById("productsSeeAll").onclick = function() { selectDept(null); };
        renderProducts(PRODUCTS[id] || []);
      }
      renderCategories();
    }

    function getFeatured() {
      var featured = [];
      Object.keys(PRODUCTS).forEach(function(k) {
        PRODUCTS[k].forEach(function(p) {
          if (p.sale) featured.push(p);
        });
      });
      return featured;
    }

    function addToCart(id, price, e) {
      if (e) e.stopPropagation();
      if (cart.indexOf(id) !== -1) return;
      cart.push(id);
      updateCart();
      var products = currentDept ? (PRODUCTS[currentDept] || []) : getFeatured();
      var q = document.getElementById("searchInput").value.toLowerCase().trim();
      if (q) {
        products = getAllProducts().filter(function(p) {
          return p.name.toLowerCase().indexOf(q) !== -1;
        });
      }
      renderProducts(products);
    }

    function updateCart() {
      var count = cart.length;
      var countEl = document.getElementById("cartCount");
      countEl.textContent = count;
      countEl.className = count > 0 ? "cart-count" : "cart-count hidden";

      var total = 0;
      var all = getAllProducts();
      cart.forEach(function(id) {
        var p = all.find(function(prod) { return prod.id === id; });
        if (p) total += p.price;
      });

      document.getElementById("cartItemCount").textContent = count;
      document.getElementById("cartTotalPrice").textContent = total.toFixed(2);

      var panel = document.getElementById("cartPanel");
      panel.className = count > 0 ? "cart-panel visible" : "cart-panel";
    }

    function toggleCart() {
      var panel = document.getElementById("cartPanel");
      if (panel.classList.contains("visible")) {
        panel.classList.remove("visible");
      } else if (cart.length > 0) {
        panel.classList.add("visible");
      }
    }

    function handleCheckout() {
      if (!authed) {
        handleAuth();
        return;
      }
      MiniApp.sendNotification({
        title: "Order Confirmed",
        body: "Your Bullseye Mart order of " + cart.length + " item(s) totaling $" + document.getElementById("cartTotalPrice").textContent + " is being prepared for pickup.",
        data: { items: cart.length, total: document.getElementById("cartTotalPrice").textContent }
      }).catch(function() {});
      cart = [];
      updateCart();
      var products = currentDept ? (PRODUCTS[currentDept] || []) : getFeatured();
      renderProducts(products);
    }

    function filterProducts() {
      var q = document.getElementById("searchInput").value.toLowerCase().trim();
      if (!q) {
        var products = currentDept ? (PRODUCTS[currentDept] || []) : getFeatured();
        document.getElementById("productsTitle").textContent = currentDept ? DEPARTMENTS.find(function(d){ return d.id === currentDept; }).name : 'Featured Products';
        document.getElementById("productsSeeAll").textContent = "See all";
        renderProducts(products);
        return;
      }
      currentDept = null;
      renderCategories();
      var all = getAllProducts();
      var results = all.filter(function(p) {
        return p.name.toLowerCase().indexOf(q) !== -1;
      });
      document.getElementById("productsTitle").textContent = 'Results for "' + q + '"';
      document.getElementById("productsSeeAll").textContent = "Clear";
      document.getElementById("productsSeeAll").onclick = function() { clearSearch(); };
      renderProducts(results);
    }

    function clearSearch() {
      document.getElementById("searchInput").value = "";
      filterProducts();
    }

    var STORES = [
      { name: "Bullseye Mart - Downtown", addr: "123 Main St, Suite 100", status: "Open Now", hours: "Closes at 10:00 PM" },
      { name: "Bullseye Mart - Westfield", addr: "456 Oak Ave, Building B", status: "Open Now", hours: "Closes at 9:00 PM" },
      { name: "Bullseye Mart - Northgate", addr: "789 Pine Rd", status: "Open Now", hours: "Closes at 11:00 PM" }
    ];

    function handleAuth() {
      var btn = document.getElementById("authBtn");
      btn.disabled = true;
      document.getElementById("bridgeStatus").textContent = "SDK: requesting auth...";

      MiniApp.requestAuthCode()
        .then(function(code) {
          authed = true;
          btn.textContent = "Signed In";
          btn.className = "bridge-btn done";
          document.getElementById("bridgeStatus").textContent = "SDK: authenticated";

          setTimeout(function() {
            MiniApp.sendNotification({
              title: "Welcome to Bullseye Mart",
              body: "You've unlocked exclusive member deals. Check out this week's featured savings!",
              data: { type: "welcome" }
            }).catch(function() {});
          }, 2000);
        })
        .catch(function(err) {
          document.getElementById("bridgeStatus").textContent = "Auth: " + err.message;
          btn.disabled = false;
        });
    }

    function handleLocation() {
      var btn = document.getElementById("locBtn");
      btn.disabled = true;
      document.getElementById("bridgeStatus").textContent = "SDK: requesting location...";

      MiniApp.getLocation()
        .then(function(loc) {
          var bar = document.getElementById("locationBar");
          bar.className = "location-bar visible";
          bar.innerHTML = "&#128205; Near " + loc.latitude.toFixed(4) + ", " + loc.longitude.toFixed(4);
          btn.textContent = "Store Found";
          btn.className = "bridge-btn done";
          document.getElementById("bridgeStatus").textContent = "SDK: location acquired";

          var store = STORES[Math.floor(Math.random() * STORES.length)];
          document.getElementById("storeName").textContent = store.name;
          document.getElementById("storeAddr").textContent = store.addr;
          document.getElementById("storeStatus").textContent = store.status;
          document.getElementById("storeHours").textContent = store.hours;
          document.getElementById("storeSection").style.display = "block";
        })
        .catch(function(err) {
          var bar = document.getElementById("locationBar");
          bar.className = "location-bar visible error";
          bar.innerHTML = "&#10060; " + err.message;
          document.getElementById("bridgeStatus").textContent = "Location: " + err.message;
          btn.disabled = false;
        });
    }

    MiniApp.on("error", function(msg) {
      var bar = document.getElementById("locationBar");
      bar.className = "location-bar visible error";
      bar.innerHTML = "&#128683; " + (msg.message || "Permission denied by host");
      document.getElementById("bridgeStatus").textContent = "Error: " + msg.code;
    });

    renderDeals();
    renderCategories();
    renderProducts(getFeatured());
    renderRecommended();
    MiniApp.init().then(function() {
      document.getElementById("bridgeStatus").textContent = "SDK: connected";
    });
  </script>
</body>
</html>
